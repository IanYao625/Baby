<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 寶貝的晚餐 AI 助手</title>
    <style>
        :root { --primary: #f43f5e; --bg: #fff5f5; --card-bg: rgba(255, 255, 255, 0.95); }
        body { font-family: -apple-system, "PingFang TC", "Heiti TC", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        
        /* 頂部導航 */
        .nav-container { display: flex; gap: 12px; margin-bottom: 25px; width: 100%; max-width: 400px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; border: none; font-size: 0.95rem; text-align: center; text-decoration: none; transition: 0.3s; }
        .nav-active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(244,63,94,0.3); }
        .nav-inactive { background: white; color: #888; border: 1px solid #eee; }

        /* 主要卡片 */
        .card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 30px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; text-align: center; }
        h2 { color: #333; margin-top: 0; font-size: 1.5rem; }
        
        /* AI 結果顯示區 */
        .result-area { text-align: left; margin-top: 20px; line-height: 1.6; color: #444; min-height: 100px; padding: 15px; border-radius: 15px; background: #fff; border: 1px solid #f0f0f0; }
        .option-card { border-left: 5px solid var(--primary); padding-left: 12px; margin-bottom: 15px; background: #fffafb; padding: 10px; border-radius: 0 10px 10px 0; }
        
        /* 按鈕 */
        .go-btn { background: #000; color: white; width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 15px; transition: 0.2s; }
        .go-btn:active { transform: scale(0.98); }
        .go-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* 調試訊息 */
        .debug-msg { font-size: 0.7rem; color: #bbb; margin-top: 15px; }
        .error-log { color: #e11d48; font-size: 0.8rem; background: #fff1f2; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px dashed #f43f5e; text-align: left; display: none; }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="nav-btn nav-inactive">📋 瘦身計劃</a>
        <a href="dinner.html" class="nav-btn nav-active">🍽️ 寶貝晚餐</a>
    </div>

    <div class="card">
        <h2>✨ 晚餐吃什麼？</h2>
        <div id="result" class="result-area">
            準備好挑選今日的健康晚餐了嗎？點擊下方按鈕開始！
        </div>
        
        <button class="go-btn" id="askBtn" onclick="askAI()">🚀 幫我準備清單</button>
        
        <div id="errorLog" class="error-log"></div>
        <div class="debug-msg" id="statusMsg">API 狀態：等待指令</div>
    </div>

    <script>
        // 🔑 你的新金鑰 (已更新)
        const KEY = "AIzaSyAx3DcRbxgR_ugSGjDsTmJLYf59LG-HYYA";

        // 🤖 自動掃描模型清單 (由新到舊)
        const MODELS = [
            "gemini-2.0-flash", 
            "gemini-1.5-flash", 
            "gemini-1.5-flash-8b", 
            "gemini-1.0-pro"
        ];

        async function askAI() {
            const resArea = document.getElementById('result');
            const btn = document.getElementById('askBtn');
            const statusMsg = document.getElementById('statusMsg');
            const errorLog = document.getElementById('errorLog');
            
            resArea.innerHTML = "<p style='color:var(--primary); text-align:center;'>⏳ 正在為您搜尋健康食譜...</p>";
            errorLog.style.display = "none";
            btn.disabled = true;

            const prompt = "你是專業營養師。請推薦3組台灣便利商店（7-11或全家）的減脂晚餐。要求：高蛋白質、無生菜、無牛奶、無負擔。請用繁體中文回覆，每組建議都要有品名和簡單理由。";

            let success = false;

            // 🔄 開始掃描可用模型
            for (let modelName of MODELS) {
                statusMsg.innerText = `正在嘗試啟動引擎: ${modelName}...`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.candidates && data.candidates[0].content) {
                        // 處理回傳文字格式
                        const rawText = data.candidates[0].content.parts[0].text;
                        resArea.innerHTML = formatAIResponse(rawText);
                        
                        statusMsg.innerText = `✅ 成功！引擎使用中: ${modelName}`;
                        success = true;
                        break; // 成功後跳出迴圈
                    } else {
                        console.warn(`${modelName} 回報錯誤:`, data.error?.message);
                    }
                } catch (e) {
                    console.error(`${modelName} 連線失敗`);
                }
            }

            if (!success) {
                resArea.innerHTML = "❌ 哎呀！AI 引擎暫時熄火了";
                errorLog.innerHTML = "<b>失敗原因：</b><br>所有 AI 型號均無權限。請確認您的 Google AI Studio 帳號是否啟用了 API 服務，或嘗試切換不同網路 (如 WiFi 換成 5G)。";
                errorLog.style.display = "block";
                statusMsg.innerText = "狀態：連線全數失敗";
            }
            
            btn.disabled = false;
        }

        // 格式化 AI 回傳的 Markdown 語法
        function formatAIResponse(text) {
            let formatted = text
                .replace(/\*\*(.*?)\*\*/g, '<div class="option-card"><b>$1</b></div>') // 標題加強
                .replace(/\n/g, '<br>') // 換行
                .replace(/\* /g, '• '); // 列表符號
            return formatted;
        }
    </script>
</body>
</html>
