<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 寶貝晚餐 - 營養師調配</title>
    <style>
        :root { --primary: #ff6b6b; --secondary: #f06595; --bg: #fff5f5; --accent: #ff922b; }
        body { font-family: -apple-system, "PingFang TC", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        
        .nav-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 25px; border: none; background: white; color: #888; text-decoration: none; text-align: center; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .nav-active { background: var(--primary); color: white; }

        .main-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 35px; padding: 25px; box-shadow: 0 15px 35px rgba(255, 107, 107, 0.15); width: 100%; max-width: 420px; box-sizing: border-box; text-align: center; }
        
        .tab-container { display: flex; background: #f1f3f5; border-radius: 15px; padding: 5px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: #666; }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* 標籤輸入區 */
        #fridgeArea { display: none; margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        #ingredientInput { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #eee; outline: none; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .tag { background: #ffe3e3; color: #ff6b6b; padding: 6px 12px; border-radius: 15px; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* 推薦卡片排版 */
        .result-container { text-align: left; margin-top: 15px; }
        .dish-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; border: 1px solid #fff5f5; box-shadow: 0 8px 20px rgba(0,0,0,0.03); overflow: hidden; }
        .dish-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 6px; background: var(--primary); }
        .dish-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .dish-name { font-weight: 800; color: #333; font-size: 1.1rem; }
        .calorie-badge { background: #fff4e6; color: var(--accent); padding: 4px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; border: 1px solid #ffe8cc; }
        .dish-detail { font-size: 0.9rem; color: #666; line-height: 1.6; }
        
        .go-btn { background: linear-gradient(135deg, #ff6b6b, #f06595); color: white; width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3); }
        .go-btn:disabled { background: #ddd; box-shadow: none; }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="nav-btn">📋 瘦身計劃</a>
        <a href="dinner.html" class="nav-btn nav-active">🍽️ 寶貝晚餐</a>
    </div>

    <div class="main-card">
        <div class="tab-container">
            <div id="tab1" class="tab active" onclick="switchMode('dinner')">🏠 晚餐推薦</div>
            <div id="tab2" class="tab" onclick="switchMode('fridge')">❄️ 私廚小冰箱</div>
        </div>

        <div id="fridgeArea">
            <div class="input-group">
                <input type="text" id="ingredientInput" placeholder="想用掉什麼食材？">
                <button class="add-btn" onclick="addTag()">新增</button>
            </div>
            <div id="tagsContainer" class="tags-container"></div>
        </div>

        <div id="result" class="result-container">
            <p style="text-align:center; color:#999; font-size: 0.9rem;">正在等待您的指令...</p>
        </div>
        
        <button class="go-btn" id="askBtn" onclick="handleAIRequest()">🚀 獲取營養師建議</button>
    </div>

    <script>
        const API_KEY = "AIzaSyCIW9KpPtlgynNMummEIAReQThGstKEn5c"; 
        let currentMode = 'dinner';
        let ingredients = [];

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab1').classList.toggle('active', mode === 'dinner');
            document.getElementById('tab2').classList.toggle('active', mode === 'fridge');
            document.getElementById('fridgeArea').style.display = (mode === 'fridge') ? 'block' : 'none';
            document.getElementById('result').innerHTML = '<p style="text-align:center; color:#999; font-size: 0.9rem;">請點擊按鈕獲取建議</p>';
        }

        function addTag() {
            const input = document.getElementById('ingredientInput');
            if (input.value.trim()) {
                ingredients.push(input.value.trim());
                renderTags();
                input.value = '';
            }
        }

        function renderTags() {
            document.getElementById('tagsContainer').innerHTML = ingredients.map((t, i) => `
                <div class="tag">${t} <span onclick="ingredients.splice(${i},1);renderTags()">×</span></div>
            `).join('');
        }

        async function handleAIRequest() {
            const resArea = document.getElementById('result');
            const btn = document.getElementById('askBtn');
            resArea.innerHTML = "<p style='text-align:center; color:#ff6b6b;'>⏳ 正在精算卡路里與配餐...</p>";
            btn.disabled = true;

            const prompt = currentMode === 'dinner' 
                ? "你是營養師。推薦3組台灣超商減脂晚餐。每組必須包含：1.品名 2.估計總卡路里 3.推薦理由。請用繁體中文，格式請嚴格遵守：[品名] | [卡路里] | [理由]"
                : `你是主廚。冰箱有：${ingredients.join(',')}。請推薦2道減脂料理。格式：[菜名] | [估計卡路里] | [作法說明]`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (response.ok) {
                    const text = data.candidates[0].content.parts[0].text;
                    resArea.innerHTML = parseAIResponse(text);
                }
            } catch (e) {
                resArea.innerHTML = "❌ 連線失敗";
            } finally { btn.disabled = false; }
        }

        function parseAIResponse(text) {
            // 將 AI 回傳的格式解析為漂亮的卡片
            const lines = text.split('\n').filter(l => l.includes('|'));
            if (lines.length === 0) return `<div class="dish-card">${text.replace(/\n/g, '<br>')}</div>`;

            return lines.map(line => {
                const [name, cal, desc] = line.split('|');
                return `
                    <div class="dish-card">
                        <div class="dish-header">
                            <span class="dish-name">${name.replace(/[\[\]]/g, '').trim()}</span>
                            <span class="calorie-badge">🔥 ${cal.trim()}</span>
                        </div>
                        <div class="dish-detail">${desc.trim()}</div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
