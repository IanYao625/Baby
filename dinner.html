<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 寶貝晚餐 - 智能營養管家</title>
    <style>
        :root { --primary: #ff6b6b; --secondary: #f06595; --bg: #fff5f5; --accent: #ff922b; }
        body { font-family: -apple-system, "PingFang TC", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .nav-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 25px; border: none; background: white; color: #888; text-decoration: none; text-align: center; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .nav-active { background: var(--primary); color: white; }
        .main-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 35px; padding: 25px; box-shadow: 0 15px 35px rgba(255, 107, 107, 0.15); width: 100%; max-width: 420px; box-sizing: border-box; text-align: center; position: relative; }
        
        /* 金鑰輸入小視窗 */
        #keyPrompt { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 999; }
        .key-card { background: white; padding: 25px; border-radius: 25px; width: 85%; max-width: 320px; text-align: center; }
        .key-input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; margin: 15px 0; box-sizing: border-box; }

        .tab-container { display: flex; background: #f1f3f5; border-radius: 15px; padding: 5px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: #666; }
        .tab.active { background: white; color: var(--primary); }

        #fridgeArea { display: none; margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        #ingredientInput { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #eee; outline: none; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 12px; font-weight: bold; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .tag { background: #ffe3e3; color: #ff6b6b; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 6px; }

        .result-container { text-align: left; margin-top: 15px; }
        .dish-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 6px solid var(--primary); box-shadow: 0 8px 20px rgba(0,0,0,0.03); }
        .dish-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .dish-name { font-weight: 800; color: #333; font-size: 1.1rem; }
        .calorie-badge { background: #fff4e6; color: var(--accent); padding: 4px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }
        .dish-detail { font-size: 0.9rem; color: #666; line-height: 1.5; }

        .go-btn { background: linear-gradient(135deg, #ff6b6b, #f06595); color: white; width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3); }
        .settings-icon { position: absolute; top: 20px; right: 20px; cursor: pointer; color: #ccc; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="keyPrompt">
        <div class="key-card">
            <h3>🔑 輸入新金鑰</h3>
            <p style="font-size: 0.8rem; color: #888;">為了防止外洩，請將金鑰存在本機</p>
            <input type="text" id="newApiKey" class="key-input" placeholder="AIzaSy...">
            <button class="go-btn" onclick="saveKey()">儲存並開始</button>
        </div>
    </div>

    <div class="nav-container">
        <a href="index.html" class="nav-btn">📋 瘦身計劃</a>
        <a href="dinner.html" class="nav-btn nav-active">🍽️ 寶貝晚餐</a>
    </div>

    <div class="main-card">
        <span class="settings-icon" onclick="document.getElementById('keyPrompt').style.display='flex'">⚙️</span>
        <div class="tab-container">
            <div id="tab1" class="tab active" onclick="switchMode('dinner')">🏠 晚餐推薦</div>
            <div id="tab2" class="tab" onclick="switchMode('fridge')">❄️ 私廚小冰箱</div>
        </div>

        <h3 id="modeTitle" style="color:#444; margin-bottom:15px;">✨ 寶貝今晚想吃什麼？</h3>
        
        <div id="fridgeArea">
            <div class="input-group">
                <input type="text" id="ingredientInput" placeholder="想用什麼食材？">
                <button class="add-btn" onclick="addTag()">新增</button>
            </div>
            <div id="tagsContainer" class="tags-container"></div>
        </div>

        <div id="result" class="result-container">
            <p style="text-align:center; color:#999; font-size: 0.9rem;">點擊按鈕獲取建議</p>
        </div>
        
        <button class="go-btn" id="askBtn" onclick="handleAIRequest()">🚀 獲取建議</button>
    </div>

    <script>
        let API_KEY = localStorage.getItem('GEMINI_KEY');
        let currentMode = 'dinner';
        let ingredients = [];

        // 檢查是否有金鑰，沒有就跳出輸入框
        if (!API_KEY) {
            document.getElementById('keyPrompt').style.display = 'flex';
        }

        function saveKey() {
            const key = document.getElementById('newApiKey').value.trim();
            if (key) {
                localStorage.setItem('GEMINI_KEY', key);
                API_KEY = key;
                document.getElementById('keyPrompt').style.display = 'none';
                alert("金鑰已安全儲存至您的手機！");
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab1').classList.toggle('active', mode === 'dinner');
            document.getElementById('tab2').classList.toggle('active', mode === 'fridge');
            document.getElementById('fridgeArea').style.display = (mode === 'fridge') ? 'block' : 'none';
            document.getElementById('modeTitle').innerText = (mode === 'fridge') ? '❄️ 私廚小冰箱' : '✨ 寶貝今晚想吃什麼？';
        }

        function addTag() {
            const input = document.getElementById('ingredientInput');
            if (input.value.trim()) {
                ingredients.push(input.value.trim());
                renderTags();
                input.value = '';
            }
        }

        function renderTags() {
            document.getElementById('tagsContainer').innerHTML = ingredients.map((t, i) => `
                <div class="tag">${t} <span onclick="ingredients.splice(${i},1);renderTags()">×</span></div>
            `).join('');
        }

        async function handleAIRequest() {
            if (!API_KEY) {
                document.getElementById('keyPrompt').style.display = 'flex';
                return;
            }
            const resArea = document.getElementById('result');
            const btn = document.getElementById('askBtn');
            resArea.innerHTML = "<p style='text-align:center; color:#ff6b6b;'>⏳ AI 正在規劃...</p>";
            btn.disabled = true;

            const prompt = currentMode === 'dinner' 
                ? "營養師：推薦3組台灣超商減脂晚餐。格式：[品名] | [卡路里] | [理由]。繁中。"
                : `主廚：冰箱有 ${ingredients.join(',')}。推薦2道減脂料理。格式：[菜名] | [熱量] | [作法]。繁中。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                if (data.candidates) {
                    const text = data.candidates[0].content.parts[0].text;
                    resArea.innerHTML = parseAIResponse(text);
                } else { throw new Error(data.error.message); }
            } catch (error) {
                resArea.innerHTML = "❌ 金鑰可能失效或連線錯誤";
                console.error(error);
            } finally { btn.disabled = false; }
        }

        function parseAIResponse(text) {
            const lines = text.split('\n').filter(l => l.includes('|'));
            if (lines.length === 0) return `<div class="dish-card">${text.replace(/\n/g, '<br>')}</div>`;
            return lines.map(line => {
                const [n, c, d] = line.split('|');
                return `<div class="dish-card">
                    <div class="dish-header"><span class="dish-name">${n.replace(/[\[\]]/g,'').trim()}</span><span class="calorie-badge">🔥 ${c.trim()}</span></div>
                    <div class="dish-detail">${d.trim()}</div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
