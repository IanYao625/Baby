<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 寶貝的晚餐 - AI 修復版</title>
    <style>
        :root { --primary: #f43f5e; --bg: #fff5f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .nav-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid #eee; background: white; color: #888; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .nav-active { background: #ff6b6b; color: white; border: none; }
        .card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        .go-btn { background: #000; color: white; width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 15px; transition: 0.2s; }
        .go-btn:disabled { background: #ccc; }
        .result-area { text-align: left; margin-top: 20px; line-height: 1.6; color: #444; min-height: 50px; }
        .error-box { color: #e11d48; font-size: 0.8rem; background: #fff1f2; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px dashed #f43f5e; }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="nav-btn">📋 瘦身計劃</a>
        <a href="dinner.html" class="nav-btn nav-active">🍽️ 寶貝晚餐</a>
    </div>

    <div class="card">
        <h2 style="margin: 0 0 15px 0;">✨ 晚餐吃什麼？</h2>
        <div id="result" class="result-area">點擊按鈕，讓 AI 為你挑選...</div>
        <button class="go-btn" id="askBtn" onclick="askAI()">🚀 幫我準備清單</button>
        <div id="debug-info"></div>
    </div>

    <script>
        // 🔑 你的備用金鑰池
        const KEYS = [
            "AIzaSyBpW9OBq7lr_CPauCfsZi2TACR2nRr-I_4",
            "AIzaSyB4ZlvsRRVP6pSFNmDfqvSjtUhKG3atl2w"
        ];

        async function askAI() {
            const resArea = document.getElementById('result');
            const debugArea = document.getElementById('debug-info');
            const btn = document.getElementById('askBtn');
            
            resArea.innerHTML = "⏳ AI 正在思考中，請稍候...";
            debugArea.innerHTML = "";
            btn.disabled = true;

            const prompt = "你是專業營養師。請推薦3組台灣便利商店（如7-11/全家）的減脂晚餐。要求：高蛋白質、無生菜、無牛奶。請用繁體中文，格式清晰。";
            
            let success = false;
            let errorLog = [];

            // 🔄 輪詢金鑰與調用版本
            for (let key of KEYS) {
                const apiVersions = ['v1beta', 'v1']; // 同時嘗試兩種路徑
                for (let ver of apiVersions) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/${ver}/models/gemini-1.5-flash:generateContent?key=${key}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            referrerPolicy: "no-referrer", // 🔒 隱藏來源，防止 API 被鎖
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }]
                            })
                        });

                        const data = await response.json();

                        if (response.ok && data.candidates) {
                            resArea.innerHTML = formatResponse(data.candidates[0].content.parts[0].text);
                            success = true;
                            break;
                        } else {
                            errorLog.push(`${ver} 失敗: ${data.error ? data.error.message : '未知錯誤'}`);
                        }
                    } catch (e) {
                        errorLog.push(`網路連線問題`);
                    }
                }
                if (success) break;
            }

            if (!success) {
                resArea.innerHTML = "❌ 暫時無法連線到 AI 伺服器";
                debugArea.innerHTML = `<div class="error-box"><b>修復建議：</b><br>${errorLog[0]}<br><br>請檢查 Google AI Studio 是否限制了金鑰權限。</div>`;
            }
            btn.disabled = false;
        }

        // 簡單格式化 AI 回傳的文字
        function formatResponse(text) {
            return text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\* /g, '• ');
        }
    </script>
</body>
</html>
