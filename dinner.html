<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 寶貝晚餐二合一</title>
    <style>
        :root { --primary: #ff6b6b; --secondary: #f06595; --bg: #fff5f5; }
        body { font-family: -apple-system, "PingFang TC", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        
        .nav-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 25px; border: none; background: white; color: #888; text-decoration: none; text-align: center; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .nav-active { background: var(--primary); color: white; }

        .main-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 35px; padding: 25px; box-shadow: 0 15px 35px rgba(255, 107, 107, 0.15); width: 100%; max-width: 420px; box-sizing: border-box; text-align: center; }
        
        /* 功能切換 Tabs */
        .tab-container { display: flex; background: #f1f3f5; border-radius: 15px; padding: 5px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: #666; transition: 0.3s; }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* 輸入框 */
        #fridgeInput { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 15px; box-sizing: border-box; display: none; }
        
        .result-container { text-align: left; margin-top: 15px; min-height: 100px; }
        .dish-card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .dish-name { font-weight: bold; color: #333; font-size: 1rem; display: block; margin-bottom: 4px; }
        
        .go-btn { background: linear-gradient(135deg, #ff6b6b, #f06595); color: white; width: 100%; padding: 16px; border-radius: 18px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 5px; }
        .go-btn:disabled { background: #ddd; }
        .status-info { font-size: 0.7rem; color: #ccc; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="nav-btn">📋 瘦身計劃</a>
        <a href="dinner.html" class="nav-btn nav-active">🍽️ 寶貝晚餐</a>
    </div>

    <div class="main-card">
        <div class="tab-container">
            <div id="tab1" class="tab active" onclick="switchMode('dinner')">🏠 晚餐推薦</div>
            <div id="tab2" class="tab" onclick="switchMode('fridge')">❄️ 私廚小冰箱</div>
        </div>

        <h3 id="modeTitle" style="color:#444; margin-bottom:15px;">✨ 寶貝今晚想吃什麼？</h3>
        
        <input type="text" id="fridgeInput" placeholder="冰箱裡有什麼？(例：雞蛋、番茄)">

        <div id="result" class="result-container">
            <p style="text-align:center; color:#999; font-size: 0.9rem;">準備好挑選今日的健康晚餐了嗎？</p>
        </div>
        
        <button class="go-btn" id="askBtn" onclick="handleAIRequest()">🚀 獲取建議</button>
        
        <div class="status-info" id="status">Gemini 2.5 Flash 模式</div>
    </div>

    <script>
        // ⚠️ 這裡貼上你剛剛成功的那組新金鑰
        const API_KEY = "AIzaSyCIW9KpPtlgynNMummEIAReQThGstKEn5c"; 
        let currentMode = 'dinner';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab1').classList.toggle('active', mode === 'dinner');
            document.getElementById('tab2').classList.toggle('active', mode === 'fridge');
            document.getElementById('fridgeInput').style.display = (mode === 'fridge') ? 'block' : 'none';
            document.getElementById('modeTitle').innerText = (mode === 'fridge') ? '❄️ 私廚小冰箱' : '✨ 寶貝今晚想吃什麼？';
            document.getElementById('result').innerHTML = '<p style="text-align:center; color:#999; font-size: 0.9rem;">模式已切換</p>';
        }

        async function handleAIRequest() {
            const resArea = document.getElementById('result');
            const btn = document.getElementById('askBtn');
            const fridgeItems = document.getElementById('fridgeInput').value;
            
            resArea.innerHTML = "<p style='text-align:center; color:#ff6b6b;'>⏳ AI 正在為您規劃...</p>";
            btn.disabled = true;

            let prompt = "";
            if (currentMode === 'dinner') {
                prompt = "你是專業營養師。請推薦3組台灣便利商店的減脂晚餐。要求：高蛋白、無生菜、無牛奶。請用繁體中文回覆，每組都要有品名和理由。";
            } else {
                prompt = `你是私人主廚。冰箱食材有：${fridgeItems}。請以此推薦2-3道簡易的健康晚餐料理做法。請用繁體中文。`;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (response.ok) {
                    const text = data.candidates[0].content.parts[0].text;
                    resArea.innerHTML = formatResponse(text);
                } else {
                    throw new Error(data.error.message);
                }
            } catch (error) {
                resArea.innerHTML = `<p style="color:red; font-size:0.8rem;">連線失敗：${error.message}</p>`;
            } finally {
                btn.disabled = false;
            }
        }

        function formatResponse(text) {
            const items = text.split(/\d\./).filter(s => s.trim().length > 5);
            if (items.length < 2) return `<div class="dish-card">${text.replace(/\n/g, '<br>')}</div>`;
            return items.map(item => `
                <div class="dish-card">
                    <span class="dish-name">📍 推薦建議</span>
                    <div style="font-size:0.9rem; color:#666;">${item.trim().replace(/\n/g, '<br>').replace(/\*/g, '')}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
