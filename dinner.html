<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 晚餐助手 - Gemini 2.5 Flash</title>
    <style>
        :root { --primary: #f43f5e; --bg: #fff5f5; }
        body { font-family: -apple-system, "PingFang TC", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .nav-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #eee; background: white; color: #888; text-decoration: none; text-align: center; font-weight: bold; }
        .nav-active { background: #ff6b6b; color: white; border: none; }
        .card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        .go-btn { background: #000; color: white; width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 15px; }
        .result-area { text-align: left; margin-top: 20px; color: #444; line-height: 1.6; min-height: 50px; }
        .debug-msg { font-size: 0.75rem; color: #cc0000; margin-top: 15px; text-align: left; white-space: pre-wrap; background: #fff0f0; padding: 15px; border-radius: 10px; display: none; border: 1px solid #ffccd5; }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="nav-btn">📋 瘦身計劃</a>
        <a href="dinner.html" class="nav-btn nav-active">🍽️ 寶貝晚餐</a>
    </div>

    <div class="card">
        <h2 style="margin:0 0 10px 0;">✨ 晚餐吃什麼？</h2>
        <div id="result" class="result-area">正在準備與 Gemini 2.5 Flash 連線...</div>
        <button class="go-btn" id="askBtn" onclick="callGemini25()">🚀 詢問 Gemini 2.5</button>
        <div id="debug" class="debug-msg"></div>
    </div>

    <script>
        // 使用你的新金鑰
        const API_KEY = "AIzaSyCIW9KpPtlgynNMummEIAReQThGstKEn5c";

        async function callGemini25() {
            const resArea = document.getElementById('result');
            const debugArea = document.getElementById('debug');
            const btn = document.getElementById('askBtn');
            
            resArea.innerHTML = "⏳ 正在請求 Gemini 2.5 Flash 生成建議...";
            debugArea.style.display = "none";
            btn.disabled = true;

            // 嚴格指定使用 Gemini 2.5 Flash
            const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: "推薦3個台灣超商減脂晚餐建議，請用繁體中文回覆。格式要漂亮。" }]
                        }]
                    })
                });

                const data = await response.json();

                if (response.ok && data.candidates) {
                    const text = data.candidates[0].content.parts[0].text;
                    resArea.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                } else {
                    // 若失敗，拋出詳細錯誤供排查
                    throw new Error(data.error ? data.error.message : JSON.stringify(data));
                }
            } catch (error) {
                resArea.innerHTML = "❌ 存取 Gemini 2.5 Flash 失敗。";
                debugArea.innerHTML = "<b>排錯細節：</b>\n" + error.message;
                debugArea.style.display = "block";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
