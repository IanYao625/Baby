<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 寶貝的晚餐</title>
    <style>
        :root { --primary: #f43f5e; --bg-overlay: rgba(255, 255, 255, 0.85); }
        body { 
            font-family: -apple-system, "PingFang TC", sans-serif; 
            background: #fdf2f2; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; 
        }
        /* 頁面頂部導覽列：修正切換問題 */
        .nav-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; width: 100%; max-width: 450px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; border: none; font-size: 0.95rem; text-align: center; text-decoration: none; }
        .nav-active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(244,63,94,0.3); }
        .nav-inactive { background: white; color: #888; border: 1px solid #eee; }

        .card { background: var(--bg-overlay); backdrop-filter: blur(12px); border-radius: 35px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .mode-switch { display: flex; gap: 8px; margin-bottom: 20px; background: #ffe4e6; padding: 5px; border-radius: 15px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; color: #fb7185; background: transparent; }
        .mode-btn.active { background: white; color: var(--primary); }
        
        .key-tag { font-size: 0.7rem; padding: 5px 12px; border-radius: 10px; background: #eee; cursor: pointer; margin-bottom: 15px; display: inline-block; }
        .key-tag.active { background: #343a40; color: white; }

        .option-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; text-align: left; border-left: 6px solid #fb7185; box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        .btn { border: none; padding: 16px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .go-btn { background: #000; color: white; }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="nav-btn nav-inactive">📋 瘦身計劃</a>
        <a href="dinner.html" class="nav-btn nav-active">🍽️ 寶貝晚餐</a>
    </div>

    <div class="card">
        <div class="mode-switch">
            <button id="m1" class="mode-btn active" onclick="switchMode('store')">🏪 晚餐模式</button>
            <button id="m2" class="mode-btn" onclick="switchMode('chef')">👨‍🍳 冰箱模式</button>
        </div>

        <div style="margin-bottom: 10px;">
            <span id="kt0" class="key-tag active" onclick="selectKey(0)">🔑 金鑰 1 (RR-I)</span>
            <span id="kt1" class="key-tag" onclick="selectKey(1)">🔑 金鑰 2 (tl2w)</span>
        </div>

        <h2 id="title">✨ 晚餐想吃什麼？</h2>
        
        <div id="chef-tools" style="display:none; margin-bottom: 15px;">
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <input type="text" id="newTag" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;" placeholder="新增食材...">
                <button onclick="addTag()" style="padding:10px; border-radius:10px; background:#000; color:#fff; border:none;">加</button>
            </div>
            <div id="tagList" style="display:flex; flex-wrap:wrap; gap:5px; justify-content:center;"></div>
        </div>

        <div id="result-area"></div>
        <button class="btn go-btn" id="goBtn" onclick="askAI()">🚀 幫我準備清單</button>
        <button class="btn" id="resetBtn" style="display:none; background:white; border:1px solid #000;" onclick="resetUI()">⬅️ 重新挑選</button>
    </div>

<script>
    let currentMode = 'store';
    let currentKeyIdx = 0;
    let myFridge = ['雞蛋', '雞胸肉', '鯛魚', '豆腐'];
    let selectedTags = [];

    const KEYS = [
        "AIzaSyBpW9OBq7lr_CPauCfsZi2TACR2nRr-I_4",
        "AIzaSyB4ZlvsRRVP6pSFNmDfqvSjtUhKG3atl2w"
    ];

    // 嚴格型號清單
    const MODELS = ["gemini-2.5-flash", "gemini-2.5-flash-lite", "gemini-3-flash"];

    function selectKey(idx) {
        currentKeyIdx = idx;
        document.getElementById('kt0').className = idx === 0 ? 'key-tag active' : 'key-tag';
        document.getElementById('kt1').className = idx === 1 ? 'key-tag active' : 'key-tag';
    }

    function switchMode(m) {
        currentMode = m;
        document.getElementById('m1').className = m === 'store' ? 'mode-btn active' : 'mode-btn';
        document.getElementById('m2').className = m === 'chef' ? 'mode-btn active' : 'mode-btn';
        document.getElementById('chef-tools').style.display = m === 'chef' ? 'block' : 'none';
        document.getElementById('title').innerText = m === 'store' ? '✨ 晚餐吃什麼？' : '👨‍🍳 私廚小冰箱';
        resetUI();
        if(m === 'chef') renderTags();
    }

    function renderTags() {
        const list = document.getElementById('tagList'); list.innerHTML = "";
        myFridge.forEach(t => {
            const span = document.createElement('span');
            span.style.cssText = `padding:6px 12px; border-radius:10px; cursor:pointer; font-size:0.85rem; border:1px solid #ddd; background:${selectedTags.includes(t)?'#f43f5e':'white'}; color:${selectedTags.includes(t)?'white':'black'};`;
            span.innerText = t;
            span.onclick = () => {
                if(selectedTags.includes(t)) selectedTags = selectedTags.filter(x => x!==t);
                else selectedTags.push(t);
                renderTags();
            };
            list.appendChild(span);
        });
    }

    function addTag() { const v = document.getElementById('newTag').value; if(v){myFridge.push(v); renderTags(); document.getElementById('newTag').value="";} }

    function resetUI() {
        document.getElementById('result-area').innerHTML = "";
        document.getElementById('goBtn').style.display = "block";
        document.getElementById('resetBtn').style.display = "none";
    }

    async function askAI() {
        const resArea = document.getElementById('result-area');
        const goBtn = document.getElementById('goBtn');
        resArea.innerHTML = "<p style='color:#fb7185; animation:pulse 1s infinite;'>🧪 正在呼叫高級頻道...</p>";
        goBtn.disabled = true;

        let prompt = currentMode === 'store' ? 
            "推薦3組超商減脂晚餐，高蛋白、無生菜、無牛奶。格式：<div class='option-card'><b>[推薦] 品名</b><p>📍 清單：... </p></div>" :
            `食材：${selectedTags.join(',')}。做2道減脂菜。格式：<div class='option-card'><b>🍴 品名</b><p>🍳 步驟：... </p></div>`;

        let success = false;
        let log = "";

        for (let model of MODELS) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${KEYS[currentKeyIdx]}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resArea.innerHTML = data.candidates[0].content.parts[0].text.replace(/```html|```/g, "");
                    success = true;
                    break;
                } else {
                    log += `${model}(${response.status}) `;
                }
            } catch (e) { log += `${model}(連線失敗) `; }
        }

        if (!success) {
            resArea.innerHTML = `<div style="color:red; font-size:0.8rem; padding:15px; border:1px dashed red; border-radius:15px;">❌ 金鑰無權限或型號未啟用<br>錯誤日誌：${log}<br><br>💡 建議：點擊切換「金鑰 2」再試一次。</div>`;
        } else {
            goBtn.style.display = "none";
            document.getElementById('resetBtn').style.display = "block";
        }
        goBtn.disabled = false;
    }
</script>
</body>
</html>
