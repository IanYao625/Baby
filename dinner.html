<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 寶貝晚餐 - 營養管家</title>
    <style>
        :root { --primary: #ff6b6b; --secondary: #f06595; --bg: #fff5f5; --accent: #ff922b; }
        body { font-family: -apple-system, "PingFang TC", "Heiti TC", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        
        /* 導航列 */
        .nav-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 25px; border: none; background: white; color: #888; text-decoration: none; text-align: center; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .nav-active { background: var(--primary); color: white; }

        /* 主卡片 */
        .main-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 35px; padding: 25px; box-shadow: 0 15px 35px rgba(255, 107, 107, 0.15); width: 100%; max-width: 420px; box-sizing: border-box; text-align: center; border: 1px solid #fff; }
        
        /* Tab 切換器 */
        .tab-container { display: flex; background: #f1f3f5; border-radius: 15px; padding: 5px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: #666; transition: 0.3s; }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* 私廚小冰箱 - 標籤輸入區 */
        #fridgeArea { display: none; margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        #ingredientInput { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #eee; outline: none; transition: 0.3s; }
        #ingredientInput:focus { border-color: var(--primary); }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; justify-content: center; min-height: 30px; }
        .tag { background: #ffe3e3; color: #ff6b6b; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 6px; animation: pop 0.3s ease; }
        .tag span { cursor: pointer; font-size: 1.2rem; display: inline-block; margin-top: -2px; }

        /* 結果顯示卡片 */
        .result-container { text-align: left; margin-top: 15px; }
        .dish-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; border-left: 6px solid var(--primary); box-shadow: 0 8px 20px rgba(0,0,0,0.03); animation: fadeIn 0.5s ease; }
        .dish-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .dish-name { font-weight: 800; color: #333; font-size: 1.1rem; }
        .calorie-badge { background: #fff4e6; color: var(--accent); padding: 4px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; border: 1px solid #ffe8cc; }
        .dish-detail { font-size: 0.9rem; color: #666; line-height: 1.6; }

        /* 按鈕與狀態 */
        .go-btn { background: linear-gradient(135deg, #ff6b6b, #f06595); color: white; width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3); transition: 0.2s; }
        .go-btn:active { transform: translateY(2px); }
        .go-btn:disabled { background: #ddd; box-shadow: none; cursor: not-allowed; }
        
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="nav-btn">📋 瘦身計劃</a>
        <a href="dinner.html" class="nav-btn nav-active">🍽️ 寶貝晚餐</a>
    </div>

    <div class="main-card">
        <div class="tab-container">
            <div id="tab1" class="tab active" onclick="switchMode('dinner')">🏠 晚餐推薦</div>
            <div id="tab2" class="tab" onclick="switchMode('fridge')">❄️ 私廚小冰箱</div>
        </div>

        <h3 id="modeTitle" style="color:#444; margin-bottom:15px; font-size: 1.3rem;">✨ 寶貝今晚想吃什麼？</h3>
        
        <div id="fridgeArea">
            <div class="input-group">
                <input type="text" id="ingredientInput" placeholder="輸入食材 (例：雞腿肉)">
                <button class="add-btn" onclick="addTag()">新增</button>
            </div>
            <div id="tagsContainer" class="tags-container"></div>
        </div>

        <div id="result" class="result-container">
            <p style="text-align:center; color:#999; font-size: 0.9rem; padding: 20px 0;">準備好獲取健康建議了嗎？</p>
        </div>
        
        <button class="go-btn" id="askBtn" onclick="handleAIRequest()">🚀 獲取營養師建議</button>
        <p id="errorMsg" style="color:#cc0000; font-size:0.75rem; margin-top:10px; display:none;"></p>
    </div>

    <script>
        // 🔑 填入你測試成功的 Gemini API Key
        const API_KEY = "AIzaSyCIW9KpPtlgynNMummEIAReQThGstKEn5c"; 
        let currentMode = 'dinner';
        let ingredients = [];

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab1').classList.toggle('active', mode === 'dinner');
            document.getElementById('tab2').classList.toggle('active', mode === 'fridge');
            document.getElementById('fridgeArea').style.display = (mode === 'fridge') ? 'block' : 'none';
            document.getElementById('modeTitle').innerText = (mode === 'fridge') ? '❄️ 私廚小冰箱' : '✨ 寶貝今晚想吃什麼？';
            document.getElementById('result').innerHTML = '<p style="text-align:center; color:#999; font-size:0.9rem; padding:20px 0;">模式已切換</p>';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function addTag() {
            const input = document.getElementById('ingredientInput');
            const val = input.value.trim();
            if (val && !ingredients.includes(val)) {
                ingredients.push(val);
                renderTags();
                input.value = '';
            }
        }

        function renderTags() {
            const container = document.getElementById('tagsContainer');
            container.innerHTML = ingredients.map((tag, i) => `
                <div class="tag">${tag} <span onclick="ingredients.splice(${i},1);renderTags()">×</span></div>
            `).join('');
        }

        async function handleAIRequest() {
            const resArea = document.getElementById('result');
            const btn = document.getElementById('askBtn');
            const errArea = document.getElementById('errorMsg');
            
            if (currentMode === 'fridge' && ingredients.length === 0) {
                alert("請先新增冰箱裡的食材喔！");
                return;
            }

            resArea.innerHTML = "<p style='text-align:center; color:#ff6b6b; padding:20px 0;'>⏳ 營養師正在精算熱量...</p>";
            btn.disabled = true;
            errArea.style.display = 'none';

            // 建立針對 Gemini 2.5 Flash 的指令
            let prompt = "";
            if (currentMode === 'dinner') {
                prompt = "你是專業營養師。請推薦3組台灣便利商店的減脂晚餐。每組必須包含：品名、估計總卡路里、理由。請用繁體中文。格式嚴格遵守：[品名] | [卡路里] | [理由說明]";
            } else {
                prompt = `你是私人主廚。冰箱裡有：${ingredients.join('、')}。請推薦2道減脂料理作法。格式嚴格遵守：[料理名] | [估計熱量] | [作法簡述]`;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();

                if (response.ok && data.candidates) {
                    const text = data.candidates[0].content.parts[0].text;
                    resArea.innerHTML = parseAIResponse(text);
                } else {
                    throw new Error(data.error ? data.error.message : "連線異常");
                }
            } catch (error) {
                resArea.innerHTML = "<p style='text-align:center; color:#999;'>暫時無法獲取建議</p>";
                errArea.innerText = "❌ 連線失敗：" + error.message;
                errArea.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        }

        function parseAIResponse(text) {
            const lines = text.split('\n').filter(l => l.includes('|'));
            if (lines.length === 0) return `<div class="dish-card"><div class="dish-detail">${text.replace(/\n/g, '<br>')}</div></div>`;

            return lines.map(line => {
                const parts = line.split('|');
                const name = parts[0] ? parts[0].replace(/[\[\]]/g, '').trim() : "健康推薦";
                const cal = parts[1] ? parts[1].trim() : "精算中";
                const desc = parts[2] ? parts[2].trim() : "查看詳細說明";
                return `
                    <div class="dish-card">
                        <div class="dish-header">
                            <span class="dish-name">✨ ${name}</span>
                            <span class="calorie-badge">🔥 ${cal}</span>
                        </div>
                        <div class="dish-detail">${desc}</div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
